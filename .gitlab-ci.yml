stages:
  - validate
  - deploy

validate:
  stage: validate
  image: alpine:latest
  script:
    - test -f docker-compose.yml
    - echo "Validation passed"
  only:
    - main

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client rsync
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - rsync -av --exclude '.git/' --exclude '.gitlab-ci.yml' ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
    - ssh -i ~/.ssh/id_rsa "$DEPLOY_USER@$DEPLOY_HOST" "cd $DEPLOY_PATH && docker compose up -d"
  only:
    - main
